<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - GideonDev</title>

    <!-- Fonte do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ionicons@5.5.2/dist/css/ionicons.min.css">


    <!-- Estilos -->
    <link rel="stylesheet" href="./styles/global.css">
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/home.css">
    <link rel="stylesheet" href="./styles/tecnologias.css">
    <link rel="stylesheet" href="./styles/footer.css">
</head>
<body>
    <header>
        <div class="container">
            <img src="assets/img/Logo.svg" alt="Logo GideonDev" class="logo">
            
            <nav class="nav-desktop">
                <ul>
                    <li><a href="#inicial">Início</a></li>
                    <li><a href="#portfolio">Portfólio</a></li>
                    <li><a href="#sobre-mim">Sobre Mim</a></li>
                    <li><a href="#contato">Contato</a></li>
                </ul>
            </nav>

            <div class="menu-toggle" id="menu-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </header>

    <main>
        <section id="inicial">
            <div class="container container_home">
                <div class="col_avatar">
                    <img src="assets/img/gideonsemfundo.jpg" alt="Avatar" class="avatar">
                </div>
                <div class="col_introducion">
                    <h1>Desenvolvedor Web</h1>
                    <p>Olá, eu sou o</p>
                    <span>Gideon Alves :)</span>
                    <p>Desenvolvedor Front-End</p>
                </div>
            </div>
        </section>

        <section id="Tecnologias">
            <div class="container container_tecnologia">
                    <h2>Tecnologias</h2>

                    <div class="tech-icons">
                        <div class="img-icon">
                            <img src="assets/icons/React.svg" alt="HTML" class="tech-icon">
                            <span>React.js</span>
                        </div>
                        <div class="img-icon">
                            <img src="assets/icons/HTML.svg" alt="CSS" class="tech-icon">
                            <span>HTML</span>
                        </div>
                        <div class="img-icon">
                            <img src="assets/icons/CSS.svg" alt="JavaScript" class="tech-icon">
                            <span>CSS</span>
                        </div>
                        <div class="img-icon">
                            <img src="assets/icons/javascript.svg" alt="React" class="tech-icon">
                            <span>JavaScript</span>
                        </div>
                    </div>

                    <button class="btn-ptf">Conheça meu Portfólio</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 GideonDev. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Função para abrir/fechar o menu hambúrguer
        document.getElementById('menu-toggle').addEventListener('click', function() {
            const nav = document.querySelector('nav');
            nav.classList.toggle('active');
        });
    </script>
</body>
</html>
