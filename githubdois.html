<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto no GitHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #repoInfo {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Meu Repositório no GitHub</h1>
    <button onclick="getGitHubRepo()">Carregar Projeto</button>
    
    <div id="repoInfo"></div>

    <script>
        async function getGitHubRepo() {
            const username = "gideonalves";
            const repoName = "coffee-delivery"; // 🔹 Substitua pelo nome do seu repositório
            
            const url = `https://api.github.com/repos/${username}/${repoName}`;

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`Erro: ${response.status}`);
                }

                const data = await response.json();
            console.log(data);

                document.getElementById("repoInfo").innerHTML = `
                    <h2>${data.name}</h2>
                    <p>${data.description || "Sem descrição"}</p>
                    <p>⭐ Estrelas: ${data.stargazers_count}</p>
                    <p>🍴 Forks: ${data.forks_count}</p>
                    <p><a href="${data.html_url}" target="_blank">Ver no GitHub</a></p>
                    <p>🍴 linguagem: ${data.language}</p>

                `;
            } catch (error) {
                document.getElementById("repoInfo").innerHTML = `<p style="color:red;">Erro ao buscar repositório.</p>`;
                console.error(error);
            }
        }
    </script>

</body>
</html>
